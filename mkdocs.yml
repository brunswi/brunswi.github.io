# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: KTTN AEM Libraries
site_url: https://aem.kttn.org/
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  # Material loads these from Google Fonts; avoid duplicating via @import in extra.css.
  font:
    text: Work Sans
    code: Fira Code
  palette:
    scheme: default
    primary: black
    accent: indigo
extra:
  maintainer:
    name: Florian Brunswicker
    github: brunswi

extra_css:
  - stylesheets/extra.css
hooks:
  - scripts/hooks/hooks.py
  - scripts/hooks/sitemap_index.py
plugins:
  - search
  - privacy
nav:
  - Home: index.md

markdown_extensions:
  - toc:
      toc_depth: 2
