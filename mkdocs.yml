# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: KTTN AEM Libraries
site_url: https://aem.kttn.org/
site_description: Documentation hub for open-source AEM libraries — reusable solutions for HTTP, authentication, and integration patterns in Adobe Experience Manager projects.
site_author: Florian Brunswicker
theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  # Material loads these from Google Fonts; avoid duplicating via @import in extra.css.
  font:
    text: Work Sans
    code: Fira Code
  palette:
    scheme: default
    primary: black
    accent: indigo
extra:
  maintainer:
    name: Florian Brunswicker
    github: brunswi

extra_css:
  - stylesheets/extra.css
hooks:
  - docs/hooks/hooks.py
  - docs/hooks/sitemap_index.py
plugins:
  - search
  - privacy
nav:
  - Home: index.md

markdown_extensions:
  - toc:
      toc_depth: 2
